<!doctype html>
<html>
  <head>
	<link rel="stylesheet" href="ttalk.css"></link>
  </head>
  <body>
	<p id="message"></p>
	<p id="instructions"></p>


	<div id="copybox_pane">
	  <input id="copybox" class="hide"></input>
	</div>

	<div id="first_author_pane" class="hide">
	  What do we call you? <span class="counter" id="first_author_counter"></span> <br>
	  <input id="first_author_in"></input>
	</div>

	<div id="second_author_pane" class="hide">
	  Your partner is called: <span id="first_author"></span>
	  What do we call you? <span class="counter" id="second_author_counter"></span> <br> 
	  <input id="second_author_in"></input>
	</div>


	<div id="previous_pane" class="hide">
	  <p> Here is what your partner just wrote:</p>
	  <h1 id="previous_header"></h1>
	  <p id="previous_body"></p>
	</div>


	<div id="input_pane" class="hide">
	  <div id="header_wrapper"> header <span class="counter" id="header_counter"></span> <br>
		<input id="header"></input></div>
	  <div id="body_wrapper"> body	<span class="counter" id="body_counter"></span>  <br>
		<textarea id="body"></textarea></div>
	  <button id="input_button"></button>
	</div>

	<div id="final_pane" class="hide">
	  <span class="firstw"><span id="first_author_out"></span> had the first word:</span>
	  <div class="word">
		<h1 id="final_header_1"></h1>
		<p id="final_body_1"></p>
	  </div>

	  <span class="lastw"><span id="second_author_out"></span> had the last word:</span>
	  <div class="word">
		<h1 id="final_header_2"></h1>
		<p id="final_body_2"></p>
	  </div>

	  <p id="link_to_new_wrapper">You can <a id="link_to_new" href="">Create a new dialog.</a></p>
	</div>

	<script src="ttalk.js"></script>
  </body>
</html>
